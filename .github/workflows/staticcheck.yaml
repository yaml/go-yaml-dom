name: Staticcheck

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  staticcheck:
    name: Staticcheck
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Run Staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: latest
          install-go: false
